<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulturnatten Stockholm 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d0d1a;
    color: #e8e0f0;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a0533 0%, #0d1a33 100%);
    border-bottom: 1px solid #3d1a5c;
    padding: 22px 20px 16px;
    text-align: center;
  }
  header h1 {
    font-size: 1.9rem;
    font-weight: 800;
    background: linear-gradient(90deg, #c084fc, #818cf8, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  header p { color: #a78bca; font-size: 0.85rem; }

  .controls {
    background: #12122a;
    border-bottom: 1px solid #1e1e40;
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    background: #1e1e3a;
    border: 1px solid #3d3d70;
    border-radius: 8px;
    color: #e8e0f0;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: #818cf8; }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: #a78bca; pointer-events: none;
  }
  select, .toggle-btn {
    padding: 9px 11px;
    background: #1e1e3a;
    border: 1px solid #3d3d70;
    border-radius: 8px;
    color: #e8e0f0;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    transition: border 0.2s;
  }
  select:hover { border-color: #818cf8; }
  .toggle-btn { display: flex; align-items: center; gap: 5px; user-select: none; }
  .toggle-btn.active { border-color: #c084fc; color: #c084fc; background: #1e0e3a; }
  .toggle-btn:hover { border-color: #818cf8; }
  .count {
    color: #a78bca; font-size: 0.82rem;
    white-space: nowrap; padding: 0 2px; margin-left: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
    padding: 18px 20px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .card {
    background: #16162e;
    border: 1px solid #2a2a50;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #c084fc, #818cf8);
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover { border-color: #818cf8; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(129,140,248,0.12); }
  .card:hover::before { opacity: 1; }
  .card.expanded { border-color: #c084fc; }
  .card.expanded::before { opacity: 1; background: linear-gradient(90deg, #c084fc, #38bdf8); }

  .score-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .score-bar-wrap {
    flex: 1; height: 5px; background: #1e1e3a; border-radius: 3px; overflow: hidden;
  }
  .score-bar {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #c084fc, #38bdf8);
  }
  .score-num {
    font-size: 0.72rem; font-weight: 700; color: #c084fc; white-space: nowrap;
  }
  .score-tags {
    display: none; flex-wrap: wrap; gap: 4px; margin-top: 8px; margin-bottom: 4px;
  }
  .card.expanded .score-tags { display: flex; }
  .stag {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 20px; border: 1px solid; font-weight: 600;
  }
  .stag-konst    { color: #c084fc; border-color: #5a2e8a; background: #1e0e3a; }
  .stag-mat      { color: #fb923c; border-color: #7a3e10; background: #1e0e0a; }
  .stag-utomhus  { color: #4ade80; border-color: #1a6030; background: #0a1e0d; }
  .stag-rare     { color: #facc15; border-color: #705810; background: #1e180a; }

  .venue {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: #c084fc; margin-bottom: 5px;
  }
  .card-title {
    font-size: 1rem; font-weight: 700; color: #f0eaf8; margin-bottom: 8px; line-height: 1.3;
  }
  .meta {
    display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 9px;
  }
  .badge {
    font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
    background: #1e1e3a; color: #a78bca; border: 1px solid #2e2e55;
  }
  .badge.time { color: #38bdf8; border-color: #1e3a55; background: #0d1a2e; }
  .badge.loc  { color: #a3e635; border-color: #1e3a1e; background: #0d1a0d; }
  .badge.outdoor { color: #4ade80; border-color: #1a5030; background: #0a180d; }
  .badge.rare    { color: #facc15; border-color: #604808; background: #180f00; }

  .desc {
    font-size: 0.83rem; color: #b0a0c8; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card.expanded .desc { display: block; -webkit-line-clamp: unset; }

  .program-section {
    display: none; margin-top: 13px; border-top: 1px solid #2a2a50; padding-top: 13px;
  }
  .card.expanded .program-section { display: block; }
  .program-section h4 {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: #818cf8; margin-bottom: 8px;
  }
  .prog-item { display: flex; gap: 10px; margin-bottom: 7px; font-size: 0.8rem; }
  .prog-time { color: #38bdf8; font-weight: 700; white-space: nowrap; min-width: 95px; }
  .prog-desc { color: #c0b0d8; line-height: 1.4; }
  .extra-info { margin-top: 9px; font-size: 0.78rem; color: #8080a8; font-style: italic; line-height: 1.4; }
  .address-row { margin-top: 9px; font-size: 0.75rem; color: #5a5a90; }

  .grid.compact { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .grid.compact .card { padding: 12px; }
  .grid.compact .desc,
  .grid.compact .program-section,
  .grid.compact .extra-info,
  .grid.compact .address-row { display: none !important; }
  .grid.compact .card.expanded .desc,
  .grid.compact .card.expanded .program-section,
  .grid.compact .card.expanded .extra-info,
  .grid.compact .card.expanded .address-row { display: block !important; }
  .no-results { text-align: center; padding: 80px 20px; color: #5050a0; grid-column: 1 / -1; }
  .no-results h2 { font-size: 2rem; margin-bottom: 8px; }

  .fav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; padding: 0 0 0 6px; line-height: 1;
    color: #3a3a70; transition: color 0.15s, transform 0.15s; flex-shrink: 0;
  }
  .fav-btn:hover { color: #f59e0b; transform: scale(1.15); }
  .fav-btn.is-fav { color: #f59e0b; }

  .addr-link { color: #5a5a90; text-decoration: none; transition: color 0.15s; }
  .addr-link:hover { color: #818cf8; text-decoration: underline; }

  .share-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e1e3a; color: #c084fc; border: 1px solid #5050a0;
    padding: 10px 20px; border-radius: 8px; font-size: 0.85rem;
    z-index: 9999; animation: fadeToast 2.8s forwards; white-space: nowrap;
  }
  @keyframes fadeToast {
    0%   { opacity:0; transform:translateX(-50%) translateY(8px); }
    12%  { opacity:1; transform:translateX(-50%) translateY(0); }
    75%  { opacity:1; }
    100% { opacity:0; }
  }
</style>
</head>

const MAX_SCORE = 74;
EVENTS.forEach((ev,i)=>{ev._idx=i;});
let currentList = [];
const activeFilters = new Set();

const AREAS = {
  gamlastan:   ['Gamla stan','Slussen','Kungsträdgården','Östermalmstorg'],
  city:        ['T-Centralen','Centralen','Hötorget','Rådmansgatan','Radmansgatan','Odenplan'],
  vasastan:    ['Sankt Eriksplan','Fridhemsplan'],
  ostermalm:   ['Östermalmstorg','Karlaplan','Stadion','Tekniska högskolan','Gärdet','Ropsten','Lidingö'],
  kungsholmen: ['Rådhuset','Radhuset','Thorildsplan','Kristineberg','Västra skogen'],
  sodermalm:   ['Medborgarplatsen','Skanstull','Mariatorget','Zinkensdamm','Hornstull','Liljeholmen'],
  djurgarden:  ['Djurgården','Skansen','Waldemarsudde'],
  soderort:    ['Skärholmen','Skarholmen','Vårberg','Bredäng','Midsommarkransen','Telefonplan','Hägerstensåsen','Östberga'],
  norrvastr:   ['Solna','Sundbyberg','Vällingby','Hässelby','Blackeberg','Brommaplan','Kista','Husby','Akalla','Barkarby','Jakobsberg']
};
const areaSel = document.getElementById('areaFilter');

function toggleFilter(name) {
  activeFilters.has(name) ? activeFilters.delete(name) : activeFilters.add(name);
  document.getElementById(name + 'Btn').classList.toggle('active', activeFilters.has(name));
  render();
}


function timeNum(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + (m || 0);
}

const isOutdoor = ev => (ev.score_breakdown?.utomhus || 0) >= 7;
const isRare    = ev => (ev.score_breakdown?.sallan_oppet || 0) >= 5;

function render() {
  const q   = document.getElementById('searchInput').value.toLowerCase().trim();
  const sta = areaSel.value;
  const tf  = document.getElementById('timeFilter').value;
  const srt = document.getElementById('sortSelect').value;

  const qRe = q ? new RegExp(`(?<![\\wåäöÅÄÖ])${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(?![\\wåäöÅÄÖ])`, 'i') : null;

  const minScore = parseInt(document.getElementById('scoreFilter').value) || 0;

  let list = EVENTS.filter(ev => {
    if (ev.score < minScore) return false;
    if (qRe && !qRe.test(ev.search_text)) return false;
    if (sta && !(AREAS[sta]||[]).includes(ev.station)) return false;
    if (tf) {
      const open  = timeNum(ev.opens);
      const close = timeNum(ev.closes);
      if (tf === 'late') {
        if (close < 22*60 && close !== 0) return false;
      } else {
        const h = parseInt(tf), hS = h*60, hE = (h+1)*60;
        const evOpen = open <= hE && (close === 0 || close > hS);
        const subOpen = (ev.program||[]).some(p => {
          const parts = (p.time||'').match(/(\d+:\d+)/g);
          if (!parts) return false;
          const ps = timeNum(parts[0]), pe = parts[1] ? timeNum(parts[1]) : ps+60;
          return ps < hE && pe > hS;
        });
        if (!evOpen && !subOpen) return false;
      }
    }
    if (activeFilters.has('outdoor') && !isOutdoor(ev)) return false;
    if (activeFilters.has('rare')    && !isRare(ev))    return false;
    if (activeFilters.has('favs')    && !isFav(ev))     return false;
    return true;
  });

  if (srt === 'score')     list.sort((a,b) => b.score - a.score);
  else if (srt === 'time') list.sort((a,b) => timeNum(a.opens) - timeNum(b.opens));
  else if (srt === 'az')   list.sort((a,b) => (a.title||'').localeCompare(b.title||'','sv'));
  currentList = list;

  document.getElementById('resultCount').textContent =
    list.length === EVENTS.length ? `${EVENTS.length} evenemang` : `${list.length} av ${EVENTS.length}`;

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results"><h2>😶</h2><p>Inga evenemang matchade.</p></div>';
    return;
  }

  grid.innerHTML = list.map(ev => {
    const bd  = ev.score_breakdown || {};
    const pct = Math.round((ev.score / MAX_SCORE) * 100);
    const outdoor = isOutdoor(ev), rare = isRare(ev);
    const timeStr = ev.opens && ev.closes ? `${ev.opens}–${ev.closes}` : (ev.opens||'');

    const tags = [];
    if ((bd.konst||0)       >= 6) tags.push(`<span class="stag stag-konst">🎨 Konst +${bd.konst}</span>`);
    if ((bd.mat_dryck||0)   >= 4) tags.push(`<span class="stag stag-mat">🍷 Mat/dryck +${bd.mat_dryck}</span>`);
    if ((bd.utomhus||0)     >= 7) tags.push(`<span class="stag stag-utomhus">🌿 Utomhus +${bd.utomhus}</span>`);
    if ((bd.sallan_oppet||0)>= 5) tags.push(`<span class="stag stag-rare">🔑 Sällan öppet +${bd.sallan_oppet}</span>`);

    const progHtml = ev.program?.length ? `
      <div class="program-section"><h4>Program</h4>
        ${ev.program.map(p=>`<div class="prog-item">
          <span class="prog-time">${p.time}</span>
          <span class="prog-desc">${p.desc}</span>
        </div>`).join('')}
      </div>` : '';

    return `<div class="card" onclick="this.classList.toggle('expanded')">
      <div class="score-row">
        <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
        <span class="score-num">${ev.score}p</span>
        <button class="fav-btn${isFav(ev)?' is-fav':''}" onclick="toggleFav(${ev._idx},event)" title="Favoritmarkera">★</button>
      </div>
      <div class="score-tags">${tags.join('')}</div>
      ${ev.venue?`<div class="venue">${ev.venue}</div>`:''}
      <div class="card-title">${ev.title||ev.venue}</div>
      <div class="meta">
        ${timeStr?`<span class="badge time">⏱ ${timeStr}</span>`:''}
        ${ev.station?`<span class="badge loc">📍 ${ev.station}</span>`:''}
        ${outdoor?`<span class="badge outdoor">🌿 Utomhus</span>`:''}
        ${rare?`<span class="badge rare">🔑 Sällan öppet</span>`:''}
      </div>
      ${ev.description?`<div class="desc">${ev.description}</div>`:''}
      ${progHtml}
      ${ev.extra_info?`<div class="extra-info">${ev.extra_info}</div>`:''}
      ${ev.address?`<div class="address-row"><a class="addr-link" href="https://maps.google.com/?q=${encodeURIComponent(ev.address + ', Stockholm')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📮 ${ev.address}</a></div>`:''}
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', render);
areaSel.addEventListener('change', render);
document.getElementById('timeFilter').addEventListener('change', render);
document.getElementById('sortSelect').addEventListener('change', render);
document.getElementById('scoreFilter').addEventListener('change', render);

function toggleCompact() {
  const grid = document.getElementById('grid');
  const on = grid.classList.toggle('compact');
  document.getElementById('compactBtn').classList.toggle('active', on);
}
// ─── Favourites ──────────────────────────────────────────────────────────────
const FAVS_KEY = 'kulturnatten_favs';
const getFavs  = () => JSON.parse(localStorage.getItem(FAVS_KEY) || '[]');
const saveFavs = f  => localStorage.setItem(FAVS_KEY, JSON.stringify(f));
const evId     = ev => `${ev.venue||''}|${ev.title||''}`;
const isFav    = ev => getFavs().includes(evId(ev));

function toggleFav(idx, e) {
  e.stopPropagation();
  const ev = EVENTS[idx];
  const id = evId(ev);
  const favs = getFavs();
  const i = favs.indexOf(id);
  if (i >= 0) favs.splice(i, 1); else favs.push(id);
  saveFavs(favs);
  if (activeFilters.has('favs')) { render(); return; }
  const btn = e.target.closest('.fav-btn');
  if (btn) btn.classList.toggle('is-fav', favs.includes(id));
}

function shareFavs() {
  const favs = getFavs();
  if (!favs.length) { showToast('Inga favoriter ännu ☆'); return; }
  const ids = EVENTS.reduce((acc, ev, i) => { if (favs.includes(evId(ev))) acc.push(i); return acc; }, []);
  const url = location.origin + location.pathname + '#favs=' + ids.join(',');
  navigator.clipboard.writeText(url).then(() => showToast('Länk kopierad! 🔗'));
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'share-toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2900);
}

// Load shared favorites from URL hash
(function() {
  const h = location.hash;
  if (h.startsWith('#favs=')) {
    const ids = h.slice(6).split(',').map(Number).filter(n => !isNaN(n) && EVENTS[n]);
    saveFavs(ids.map(i => evId(EVENTS[i])));
    history.replaceState(null, '', location.pathname);
    showToast(`${ids.length} favoriter laddade! ★`);
  }
})();

render();
</script>
